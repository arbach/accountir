services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: accountir
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: accountir_cloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accountir -d accountir_cloud"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
