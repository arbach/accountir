{% extends "base.html" %}
{% block title %}Settings · Maven{% endblock %}
{% block body %}
<div class="page-header">
  <div><h1>Company settings</h1><div class="subtitle">Editing <strong>{{ active_company_name }}</strong></div></div>
</div>

{% if !can_edit %}
<div class="flash err">You need owner or admin permission to edit company settings.</div>
{% endif %}

<div class="card form-narrow">
<form method="post" action="/app/admin/settings" class="stack-sm">
  <label class="field"><span class="label-text">Company name</span>
    <input type="text" name="name" value="{{ company_name }}" {% if !can_edit %}disabled{% endif %} required></label>
  <label class="field"><span class="label-text">Base currency <span class="muted">(ISO 4217)</span></span>
    <input type="text" name="base_currency" value="{{ base_currency }}" maxlength="3" {% if !can_edit %}disabled{% endif %} required></label>
  <label class="field"><span class="label-text">Fiscal year start month <span class="muted">(1–12)</span></span>
    <input type="number" name="fiscal_year_start_month" value="{{ fiscal_year_start_month }}" min="1" max="12" {% if !can_edit %}disabled{% endif %} required></label>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary" {% if !can_edit %}disabled{% endif %}>Save</button>
    <a href="/app/admin/companies" class="btn btn-ghost">Back</a>
  </div>
</form>
</div>
{% endblock %}
