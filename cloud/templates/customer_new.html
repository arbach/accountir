{% extends "base.html" %}
{% block title %}New customer · Maven{% endblock %}
{% block body %}
<div class="page-header">
  <div><h1>New customer</h1><div class="subtitle">Add a billing contact</div></div>
</div>

<form method="post" action="/app/customers" class="card" style="max-width: 720px;">
  <label class="field"><span class="label-text">Company / Customer name *</span>
    <input type="text" name="name" required autofocus>
  </label>

  <div class="form-row">
    <label class="field"><span class="label-text">Email</span>
      <input type="email" name="email" placeholder="billing@example.com">
    </label>
    <label class="field"><span class="label-text">Phone</span>
      <input type="text" name="phone" placeholder="(555) 123-4567">
    </label>
    <label class="field"><span class="label-text">Default terms</span>
      <select name="default_terms">
        <option value="due_on_receipt">Due on receipt</option>
        <option value="net_15">Net 15</option>
        <option value="net_30" selected>Net 30</option>
        <option value="net_45">Net 45</option>
        <option value="net_60">Net 60</option>
      </select>
    </label>
  </div>

  <label class="field"><span class="label-text">Address line 1</span>
    <input type="text" name="address_line1">
  </label>
  <label class="field"><span class="label-text">Address line 2</span>
    <input type="text" name="address_line2">
  </label>
  <div class="form-row">
    <label class="field"><span class="label-text">City</span><input type="text" name="city"></label>
    <label class="field"><span class="label-text">State</span>
      <input type="text" name="state" maxlength="2" placeholder="CA" style="text-transform:uppercase;">
    </label>
    <label class="field"><span class="label-text">ZIP</span><input type="text" name="postal_code"></label>
  </div>

  <label class="field"><span class="label-text">Notes</span>
    <textarea name="notes" rows="3"></textarea>
  </label>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save customer</button>
    <a href="/app/customers" class="btn btn-ghost">Cancel</a>
  </div>
</form>
{% endblock %}
