<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vendor · Accountir</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --border: #262b36; --fg: #e6e9ef;
      --dim: #9aa3b2; --accent: #5cc8ff; --bad: #f87171; --chip: #1f2530;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px 20px 60px; }
    .back { color: var(--dim); font-size: 13px; }
    h1 { font-size: 20px; margin: 14px 0 16px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); }
    th { color: var(--dim); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #1d222c; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--dim); }
    .error { color: var(--bad); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/app/transactions">&larr; All transactions</a>
    <h1 id="title">Vendor</h1>
    <div class="panel">
      <table>
        <thead><tr><th>Date</th><th>Memo</th><th>Source</th><th class="num">Amount</th></tr></thead>
        <tbody id="rows"><tr><td colspan="4" class="muted">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    const id = decodeURIComponent(location.pathname.split("/").pop());
    function esc(s) {
      return (s ?? "").toString().replace(/[&<>"]/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }
    function fmtAmount(a) { return (a / 100).toLocaleString(undefined, { minimumFractionDigits: 2 }); }
    async function load() {
      const tbody = document.getElementById("rows");
      let v;
      try {
        const res = await fetch("/vendors/" + encodeURIComponent(id));
        if (res.status === 404) { tbody.innerHTML = '<tr><td colspan="4" class="error">Vendor not found.</td></tr>'; return; }
        if (!res.ok) throw new Error("HTTP " + res.status);
        v = await res.json();
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="4" class="error">Failed to load: ' + esc(e.message) + "</td></tr>";
        return;
      }
      document.getElementById("title").textContent = v.name;
      tbody.innerHTML = "";
      for (const tx of v.transactions) {
        const tr = document.createElement("tr");
        tr.onclick = () => location.href = "/app/transactions/" + encodeURIComponent(tx.id);
        tr.innerHTML =
          "<td>" + esc(tx.date) + "</td><td>" + esc(tx.memo) + "</td>" +
          "<td>" + esc(tx.source || "manual") + '</td><td class="num">' + fmtAmount(tx.amount) + "</td>";
        tbody.appendChild(tr);
      }
    }
    load();
  </script>
</body>
</html>
