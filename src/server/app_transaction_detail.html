<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transaction · Accountir</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --border: #262b36; --fg: #e6e9ef;
      --dim: #9aa3b2; --accent: #5cc8ff; --good: #4ade80; --bad: #f87171; --chip: #1f2530;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }
    .back { color: var(--dim); font-size: 13px; }
    h1 { font-size: 20px; margin: 14px 0 4px; }
    .sub { color: var(--dim); margin-bottom: 20px; }
    .panel { background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px; margin-bottom: 16px; }
    .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--dim); margin: 0 0 12px; }
    .row { display: flex; justify-content: space-between; gap: 16px; padding: 4px 0; }
    .row .k { color: var(--dim); }
    .row .v { text-align: right; word-break: break-all; }
    .chip { display: inline-block; padding: 2px 10px; border-radius: 999px;
      background: var(--chip); font-size: 12px; }
    .chip.good { background: rgba(74,222,128,.15); color: var(--good); }
    .chip.bad { background: rgba(248,113,113,.15); color: var(--bad); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--dim); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .vendor-link { font-size: 15px; }
    .muted { color: var(--dim); }
    .error { color: var(--bad); }
    code { background: var(--chip); padding: 1px 6px; border-radius: 5px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/app/transactions">&larr; All transactions</a>
    <h1 id="memo">Transaction</h1>
    <div class="sub" id="subline"></div>
    <div id="content"><p class="muted">Loading…</p></div>
  </div>

  <script>
    const id = decodeURIComponent(location.pathname.split("/").pop());

    function fmtAmount(a, currency) {
      // Amounts are integers in the smallest unit; show with 2 decimals for fiat,
      // and as a scaled value otherwise. We don't know decimals here, so show raw/100
      // for the common fiat case and label the currency.
      const sign = a < 0 ? "-" : "";
      const abs = Math.abs(a);
      const val = (abs / 100).toLocaleString(undefined, { minimumFractionDigits: 2 });
      return sign + val + (currency && currency !== "USD" ? " " + currency : "");
    }

    function esc(s) {
      return (s ?? "").toString().replace(/[&<>"]/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    async function load() {
      const content = document.getElementById("content");
      let tx;
      try {
        const res = await fetch("/transactions/" + encodeURIComponent(id));
        if (res.status === 404) { content.innerHTML = '<p class="error">Transaction not found.</p>'; return; }
        if (!res.ok) throw new Error("HTTP " + res.status);
        tx = await res.json();
      } catch (e) {
        content.innerHTML = '<p class="error">Failed to load: ' + esc(e.message) + "</p>";
        return;
      }

      document.getElementById("memo").textContent = tx.memo || "(no memo)";
      const voidChip = tx.is_void ? ' <span class="chip bad">VOID</span>' : "";
      document.getElementById("subline").innerHTML =
        esc(tx.date) + " · " + esc(tx.source || "manual") + voidChip;

      let html = "";

      // Details panel
      html += '<div class="panel"><h2>Details</h2>';
      html += '<div class="row"><span class="k">Entry ID</span><span class="v"><code>' + esc(tx.id) + "</code></span></div>";
      html += '<div class="row"><span class="k">Reference</span><span class="v">' + esc(tx.reference || "—") + "</span></div>";
      if (tx.vendor) {
        html += '<div class="row"><span class="k">Vendor</span><span class="v vendor-link">' +
          '<a href="/app/vendors/' + encodeURIComponent(tx.vendor.id) + '">' + esc(tx.vendor.name) + " &rarr;</a></span></div>";
      }
      html += "</div>";

      // Provenance panel (statement file / on-chain)
      if (tx.statement_file || tx.crypto) {
        html += '<div class="panel"><h2>Provenance</h2>';
        if (tx.statement_file) {
          html += '<div class="row"><span class="k">Statement file</span><span class="v">' +
            esc(tx.statement_file.file_name) + "</span></div>";
          html += '<div class="row"><span class="k">Path</span><span class="v muted">' +
            esc(tx.statement_file.file_path) + "</span></div>";
        }
        if (tx.crypto) {
          const c = tx.crypto;
          const badge = c.verified
            ? '<span class="chip good">✓ verified</span>'
            : '<span class="chip bad">' + esc(c.verify_error || "unverified") + "</span>";
          html += '<div class="row"><span class="k">Chain</span><span class="v">' + esc(c.chain) + "</span></div>";
          html += '<div class="row"><span class="k">Tx hash</span><span class="v"><code>' + esc(c.tx_hash) + "</code></span></div>";
          html += '<div class="row"><span class="k">Verification</span><span class="v">' + badge + "</span></div>";
          html += '<div class="row"><span class="k">Explorer</span><span class="v">' +
            '<a href="' + esc(c.explorer_url) + '" target="_blank" rel="noopener">View on-chain &rarr;</a></span></div>';
        }
        html += "</div>";
      }

      // Lines panel
      html += '<div class="panel"><h2>Journal lines</h2><table><thead><tr>' +
        '<th>Account</th><th>Name</th><th class="num">Debit</th><th class="num">Credit</th></tr></thead><tbody>';
      for (const ln of tx.lines) {
        const debit = ln.amount > 0 ? fmtAmount(ln.amount, ln.currency) : "";
        const credit = ln.amount < 0 ? fmtAmount(ln.amount, ln.currency).replace("-", "") : "";
        html += "<tr><td>" + esc(ln.account_number) + "</td><td>" + esc(ln.account_name) +
          '</td><td class="num">' + debit + '</td><td class="num">' + credit + "</td></tr>";
      }
      html += "</tbody></table></div>";

      content.innerHTML = html;
    }

    load();
  </script>
</body>
</html>
